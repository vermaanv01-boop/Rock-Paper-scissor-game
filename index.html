<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock · Paper · Scissors</title>
  <meta name="description"
    content="A polished, glassmorphism-style Rock Paper Scissors game with score tracking and game history." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="index.style.css">
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <header>
      <h1>✊ Rock · Paper · Scissors</h1>
      <p>Make your move and outsmart the machine</p>
    </header>

    <!-- SCOREBOARD -->
    <div class="card" id="scoreboard">
      <div class="score-block">
        <div class="score-label">You</div>
        <div class="score-value" id="score-user">0</div>
      </div>
      <div class="score-divider">
        <div class="vs-line"></div>
        <span>–</span>
        <div class="vs-line"></div>
      </div>
      <div class="score-block">
        <div class="score-label">CPU</div>
        <div class="score-value" id="score-cpu">0</div>
      </div>
    </div>
    <!-- ROUND BADGE -->
    <div id="round-badge"><span id="round-text">Round 1 · Make your choice</span></div>

    <!-- CHOICE BUTTONS -->
    <div id="choices">
      <button class="choice-btn" data-choice="rock" id="btn-rock" aria-label="Play Rock">
        <span class="emoji">✊</span>
        <span class="label">Rock</span>
      </button>
      <button class="choice-btn" data-choice="paper" id="btn-paper" aria-label="Play Paper">
        <span class="emoji">✋</span>
        <span class="label">Paper</span>
      </button>
      <button class="choice-btn" data-choice="scissors" id="btn-scissors" aria-label="Play Scissors">
        <span class="emoji">✌️</span>
        <span class="label">Scissors</span>
      </button>
    </div>

    <!-- BATTLE AREA -->
    <div class="card" id="battle-area">
      <!-- VS Display -->
      <div id="battle-display">
        <div class="battle-side" id="side-user">
          <div class="battle-side-label">You</div>
          <div class="battle-emoji-wrap" id="user-emoji-wrap">❓</div>
        </div>
        <div class="vs-divider">
          <div class="vs-line"></div>
          <div class="vs-text">VS</div>
          <div class="vs-line"></div>
        </div>
        <div class="battle-side" id="side-cpu">
          <div class="battle-side-label">CPU</div>
          <div class="battle-emoji-wrap" id="cpu-emoji-wrap">❓</div>
        </div>
      </div>

      <!-- Thinking dots -->
      <div id="thinking">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span style="margin-left:6px;font-size:0.82rem;">CPU is thinking…</span>
      </div>

      <!-- Result banner -->
      <div id="result-banner">
        <div id="result-title"></div>
        <div id="result-desc"></div>
      </div>
    </div>

    <!-- HISTORY + RESET -->
    <div id="bottom-row">
      <div class="card" id="history-section">
        <div class="section-title">🕒 Last 5 Rounds</div>
        <div id="history-list">
          <div id="history-empty">No rounds played yet. Make your first move!</div>
        </div>
      </div>

      <button id="reset-btn" aria-label="Reset game">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
        </svg>
        Reset Game
      </button>
    </div>

  </div><!-- /container -->

  <script src="index.js">

  </script>
</body>

</html>

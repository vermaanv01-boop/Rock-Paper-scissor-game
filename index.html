<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock · Paper · Scissors</title>
  <meta name="description" content="A polished, glassmorphism-style Rock Paper Scissors game with score tracking and game history."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ──────────────────────────────────────────
       Reset & Base
    ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #0f0c29;
      --bg-mid:  #302b63;
      --bg-to:   #24243e;
      --glass-bg:    rgba(255,255,255,0.07);
      --glass-border:rgba(255,255,255,0.14);
      --glass-shadow:0 8px 32px rgba(0,0,0,0.4);
      --accent-rock:    #f97316;
      --accent-paper:   #38bdf8;
      --accent-scissors:#a78bfa;
      --text-primary:   #f1f5f9;
      --text-muted:     #94a3b8;
      --win-color:  #4ade80;
      --lose-color: #f87171;
      --draw-color: #fbbf24;
      --radius-card: 24px;
      --radius-btn:  20px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-from), var(--bg-mid), var(--bg-to));
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      overflow-x: hidden;
    }

    /* Orb decorations */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #7c3aed, transparent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #0ea5e9, transparent);
      bottom: -80px; right: -80px;
    }

    /* ──────────────────────────────────────────
       Keyframes
    ────────────────────────────────────────── */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px) scale(0.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.4) rotate(-8deg); opacity:0; }
      70%  { transform: scale(1.1) rotate(2deg); opacity:1; }
      100% { transform: scale(1) rotate(0deg); opacity:1; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); }
      50%       { box-shadow: 0 0 0 12px rgba(139,92,246,0.18); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px) rotate(-4deg); }
      40%     { transform: translateX(8px) rotate(4deg); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(6px); }
    }
    @keyframes slideInLeft {
      from { opacity:0; transform: translateX(-16px); }
      to   { opacity:1; transform: translateX(0); }
    }
    @keyframes countUp {
      from { transform: scale(1.4); opacity:0.4; }
      to   { transform: scale(1);   opacity:1; }
    }
    @keyframes spinOnce {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ──────────────────────────────────────────
       Layout helpers
    ────────────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    /* Glass card */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      padding: 28px;
    }

    /* ──────────────────────────────────────────
       Header
    ────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown 0.7s ease both;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 6px;
      font-weight: 400;
    }

    /* ──────────────────────────────────────────
       Scoreboard
    ────────────────────────────────────────── */
    #scoreboard {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
      animation: fadeDown 0.7s 0.1s ease both;
    }
    .score-block {
      flex: 1;
      text-align: center;
    }
    .score-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .score-value {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1;
      transition: color 0.3s;
    }
    #score-user  { color: #818cf8; }
    #score-cpu   { color: #f472b6; }

    .score-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .score-divider span {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .score-divider small {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-animated {
      animation: countUp 0.35s ease;
    }

    /* Round badge */
    #round-badge {
      text-align: center;
      margin-bottom: 18px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    #round-badge span {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 4px 16px;
    }

    /* ──────────────────────────────────────────
       Choice Buttons
    ────────────────────────────────────────── */
    #choices {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .choice-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-btn);
      padding: 22px 24px 16px;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                  border-color 0.22s, box-shadow 0.22s, background 0.22s;
      min-width: 110px;
      user-select: none;
      outline: none;
    }
    .choice-btn:focus-visible {
      outline: 2px solid rgba(255,255,255,0.5);
      outline-offset: 3px;
    }
    .choice-btn .emoji {
      font-size: 3rem;
      line-height: 1;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      display: block;
    }
    .choice-btn .label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    /* Hover states per choice */
    .choice-btn[data-choice="rock"]:hover {
      border-color: var(--accent-rock);
      box-shadow: 0 0 28px rgba(249,115,22,0.35);
      background: rgba(249,115,22,0.1);
    }
    .choice-btn[data-choice="paper"]:hover {
      border-color: var(--accent-paper);
      box-shadow: 0 0 28px rgba(56,189,248,0.35);
      background: rgba(56,189,248,0.1);
    }
    .choice-btn[data-choice="scissors"]:hover {
      border-color: var(--accent-scissors);
      box-shadow: 0 0 28px rgba(167,139,250,0.35);
      background: rgba(167,139,250,0.1);
    }

    .choice-btn:hover { transform: translateY(-6px) scale(1.04); }
    .choice-btn:hover .emoji { transform: scale(1.2) rotate(-5deg); }
    .choice-btn:hover .label { color: var(--text-primary); }
    .choice-btn:active { transform: scale(0.95); }

    /* Selected / highlighted state */
    .choice-btn.selected-rock {
      border-color: var(--accent-rock);
      box-shadow: 0 0 32px rgba(249,115,22,0.45);
      background: rgba(249,115,22,0.12);
    }
    .choice-btn.selected-paper {
      border-color: var(--accent-paper);
      box-shadow: 0 0 32px rgba(56,189,248,0.45);
      background: rgba(56,189,248,0.12);
    }
    .choice-btn.selected-scissors {
      border-color: var(--accent-scissors);
      box-shadow: 0 0 32px rgba(167,139,250,0.45);
      background: rgba(167,139,250,0.12);
    }

    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none !important;
    }

    /* ──────────────────────────────────────────
       Battle / Result Area
    ────────────────────────────────────────── */
    #battle-area {
      margin-bottom: 24px;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    #battle-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
      min-height: 130px;
    }

    .battle-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .battle-side-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
    }
    .battle-emoji-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .battle-emoji-wrap.visible {
      animation: popIn 0.55s cubic-bezier(.34,1.56,.64,1) both;
    }
    .battle-emoji-wrap.winner-glow {
      box-shadow: 0 0 32px rgba(74,222,128,0.5);
      border-color: var(--win-color);
    }
    .battle-emoji-wrap.loser-dim {
      opacity: 0.45;
    }
    .battle-emoji-wrap.shake {
      animation: shake 0.5s ease;
    }

    /* VS divider */
    .vs-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .vs-text {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-muted);
      opacity: 0.5;
    }
    .vs-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
    }

    /* Thinking indicator */
    #thinking {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 8px 0;
    }
    #thinking.active { display: flex; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,100% { opacity:0.2; transform:scale(1); }
      50%      { opacity:1;   transform:scale(1.4); }
    }

    /* Result banner */
    #result-banner {
      text-align: center;
      padding: 18px;
      border-radius: 16px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    #result-banner.show {
      display: flex;
      animation: fadeUp 0.45s cubic-bezier(.34,1.56,.64,1) both;
    }
    #result-banner.win  {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
    }
    #result-banner.lose {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
    }
    #result-banner.draw {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
    }

    #result-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .win  #result-title { color: var(--win-color); }
    .lose #result-title { color: var(--lose-color); }
    .draw #result-title { color: var(--draw-color); }
    #result-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ──────────────────────────────────────────
       History + Reset row
    ────────────────────────────────────────── */
    #bottom-row {
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    /* History */
    #history-section {}
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    #history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 0.88rem;
      animation: slideInLeft 0.35s ease both;
    }
    .history-item .h-round {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 600;
      min-width: 24px;
    }
    .history-item .h-emojis {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 1.1rem;
    }
    .history-item .h-vs {
      font-size: 0.65rem;
      color: var(--text-muted);
    }
    .history-item .h-result {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .h-result.win  { background:rgba(74,222,128,0.15);  color: var(--win-color);  }
    .h-result.lose { background:rgba(248,113,113,0.15); color: var(--lose-color); }
    .h-result.draw { background:rgba(251,191,36,0.15);  color: var(--draw-color); }

    #history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      padding: 12px 0;
      opacity: 0.6;
    }

    /* Reset button */
    #reset-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s;
    }
    #reset-btn:hover {
      background: rgba(248,113,113,0.12);
      border-color: rgba(248,113,113,0.4);
      color: var(--lose-color);
      box-shadow: 0 0 20px rgba(248,113,113,0.2);
      transform: translateY(-2px);
    }
    #reset-btn:active { transform: scale(0.97); }
    #reset-btn svg {
      transition: transform 0.4s;
    }
    #reset-btn:hover svg { transform: rotate(180deg); }

    /* ──────────────────────────────────────────
       Confetti particles
    ────────────────────────────────────────── */
    .confetti-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      top: -10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);   opacity:1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* ──────────────────────────────────────────
       Responsive
    ────────────────────────────────────────── */
    @media (max-width: 480px) {
      .choice-btn { min-width: 88px; padding: 16px 14px 12px; }
      .choice-btn .emoji { font-size: 2.4rem; }
      .battle-emoji-wrap { width: 70px; height: 70px; font-size: 2.4rem; }
      header h1 { font-size: 1.7rem; }
      .score-value { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <h1>✊ Rock · Paper · Scissors</h1>
    <p>Make your move and outsmart the machine</p>
  </header>

  <!-- SCOREBOARD -->
  <div class="card" id="scoreboard">
    <div class="score-block">
      <div class="score-label">You</div>
      <div class="score-value" id="score-user">0</div>
    </div>
    <div class="score-divider">
      <div class="vs-line"></div>
      <span>–</span>
      <div class="vs-line"></div>
    </div>
    <div class="score-block">
      <div class="score-label">CPU</div>
      <div class="score-value" id="score-cpu">0</div>
    </div>
  </div>
  <!-- ROUND BADGE -->
  <div id="round-badge"><span id="round-text">Round 1 · Make your choice</span></div>

  <!-- CHOICE BUTTONS -->
  <div id="choices">
    <button class="choice-btn" data-choice="rock"     id="btn-rock"    aria-label="Play Rock">
      <span class="emoji">✊</span>
      <span class="label">Rock</span>
    </button>
    <button class="choice-btn" data-choice="paper"   id="btn-paper"   aria-label="Play Paper">
      <span class="emoji">✋</span>
      <span class="label">Paper</span>
    </button>
    <button class="choice-btn" data-choice="scissors" id="btn-scissors" aria-label="Play Scissors">
      <span class="emoji">✌️</span>
      <span class="label">Scissors</span>
    </button>
  </div>

  <!-- BATTLE AREA -->
  <div class="card" id="battle-area">
    <!-- VS Display -->
    <div id="battle-display">
      <div class="battle-side" id="side-user">
        <div class="battle-side-label">You</div>
        <div class="battle-emoji-wrap" id="user-emoji-wrap">❓</div>
      </div>
      <div class="vs-divider">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="vs-line"></div>
      </div>
      <div class="battle-side" id="side-cpu">
        <div class="battle-side-label">CPU</div>
        <div class="battle-emoji-wrap" id="cpu-emoji-wrap">❓</div>
      </div>
    </div>

    <!-- Thinking dots -->
    <div id="thinking">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span style="margin-left:6px;font-size:0.82rem;">CPU is thinking…</span>
    </div>

    <!-- Result banner -->
    <div id="result-banner">
      <div id="result-title"></div>
      <div id="result-desc"></div>
    </div>
  </div>

  <!-- HISTORY + RESET -->
  <div id="bottom-row">
    <div class="card" id="history-section">
      <div class="section-title">🕒 Last 5 Rounds</div>
      <div id="history-list">
        <div id="history-empty">No rounds played yet. Make your first move!</div>
      </div>
    </div>

    <button id="reset-btn" aria-label="Reset game">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
      Reset Game
    </button>
  </div>

</div><!-- /container -->

<script>
  /* ══════════════════════════════════════════════
     CONSTANTS & STATE
  ══════════════════════════════════════════════ */
  const CHOICES = ['rock', 'paper', 'scissors'];

  const EMOJI = {
    rock:     '✊',
    paper:    '✋',
    scissors: '✌️',
  };

  // beats[x] = what x beats
  const BEATS = {
    rock:     'scissors',
    paper:    'rock',
    scissors: 'paper',
  };

  const RESULT_MESSAGES = {
    win:  [
      'Crushing it! 🔥',
      'You dominate! 💪',
      'Flawless! 🎯',
      'Too easy for you! 😎',
    ],
    lose: [
      'CPU wins this one! 🤖',
      'Better luck next round!',
      'The machine is learning… 🧠',
      'Outsmarted! 😬',
    ],
    draw: [
      "Great minds think alike! 🤝",
      "It's a standoff!",
      "Perfect mirror! 🪞",
      "Neither budges!",
    ],
  };

  // Mutable game state
  const state = {
    userScore: 0,
    cpuScore:  0,
    round:     1,
    history:   [],   // [{round, user, cpu, result}]
    locked:    false, // prevent clicks mid-animation
  };

  /* ══════════════════════════════════════════════
     DOM REFS
  ══════════════════════════════════════════════ */
  const els = {
    scoreUser:    document.getElementById('score-user'),
    scoreCpu:     document.getElementById('score-cpu'),
    roundText:    document.getElementById('round-text'),
    choiceBtns:   document.querySelectorAll('.choice-btn'),
    userWrap:     document.getElementById('user-emoji-wrap'),
    cpuWrap:      document.getElementById('cpu-emoji-wrap'),
    thinking:     document.getElementById('thinking'),
    resultBanner: document.getElementById('result-banner'),
    resultTitle:  document.getElementById('result-title'),
    resultDesc:   document.getElementById('result-desc'),
    historyList:  document.getElementById('history-list'),
    historyEmpty: document.getElementById('history-empty'),
    resetBtn:     document.getElementById('reset-btn'),
  };

  /* ══════════════════════════════════════════════
     CORE GAME LOGIC
  ══════════════════════════════════════════════ */

  /** Returns a random CPU choice */
  function getCpuChoice() {
    return CHOICES[Math.floor(Math.random() * CHOICES.length)];
  }

  /** 
   * Determines winner.
   * Returns 'win' | 'lose' | 'draw' from the user's perspective.
   */
  function getResult(user, cpu) {
    if (user === cpu)          return 'draw';
    if (BEATS[user] === cpu)   return 'win';
    return 'lose';
  }

  /** Returns a random message for a given result type */
  function getRandomMessage(result) {
    const pool = RESULT_MESSAGES[result];
    return pool[Math.floor(Math.random() * pool.length)];
  }

  /** Returns a human-readable description of why user won/lost */
  function getResultDescription(result, user, cpu) {
    if (result === 'draw') return `Both chose ${user} — it's a tie!`;
    if (result === 'win')  return `${capitalize(user)} beats ${capitalize(cpu)}`;
    return `${capitalize(cpu)} beats ${capitalize(user)}`;
  }

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  /* ══════════════════════════════════════════════
     UI UPDATES
  ══════════════════════════════════════════════ */

  function animateScore(el, value) {
    el.textContent = value;
    el.classList.remove('score-animated');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('score-animated');
  }

  function setRoundText(text) {
    els.roundText.textContent = text;
  }

  function lockButtons(lock) {
    state.locked = lock;
    els.choiceBtns.forEach(btn => { btn.disabled = lock; });
  }

  function clearSelections() {
    els.choiceBtns.forEach(btn => {
      btn.className = 'choice-btn';
    });
  }

  function highlightButton(choice) {
    const btn = document.getElementById(`btn-${choice}`);
    if (btn) btn.classList.add(`selected-${choice}`);
  }

  function showThinking(show) {
    els.thinking.classList.toggle('active', show);
  }

  function hideResultBanner() {
    els.resultBanner.className = 'card' === '' ? '' : '';
    els.resultBanner.classList.remove('show', 'win', 'lose', 'draw');
    els.resultBanner.style.display = '';
  }

  function showResultBanner(result, user, cpu) {
    els.resultBanner.className = '';
    els.resultBanner.id = 'result-banner';
    els.resultBanner.classList.add('show', result);
    const labels = { win: '🎉 You Win!', lose: '💀 You Lose!', draw: '🤝 Draw!' };
    els.resultTitle.textContent = labels[result];
    els.resultDesc.textContent =
      getRandomMessage(result) + '  ·  ' + getResultDescription(result, user, cpu);
  }

  function setBattleEmoji(wrap, emoji, popAnim = false) {
    wrap.textContent = emoji;
    if (popAnim) {
      wrap.classList.remove('visible');
      void wrap.offsetWidth;
      wrap.classList.add('visible');
    }
  }

  function applyBattleGlow(result) {
    els.userWrap.classList.remove('winner-glow', 'loser-dim', 'shake');
    els.cpuWrap.classList.remove('winner-glow', 'loser-dim', 'shake');
    if (result === 'win') {
      els.userWrap.classList.add('winner-glow');
      els.cpuWrap.classList.add('loser-dim');
      void els.cpuWrap.offsetWidth;
      els.cpuWrap.classList.add('shake');
    } else if (result === 'lose') {
      els.cpuWrap.classList.add('winner-glow');
      els.userWrap.classList.add('loser-dim');
      void els.userWrap.offsetWidth;
      els.userWrap.classList.add('shake');
    }
  }

  /* ══════════════════════════════════════════════
     HISTORY
  ══════════════════════════════════════════════ */
  function addHistoryEntry(entry) {
    state.history.unshift(entry);          // newest first
    if (state.history.length > 5) state.history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (state.history.length === 0) {
      els.historyEmpty.style.display = 'block';
      els.historyList.innerHTML = '';
      els.historyList.appendChild(els.historyEmpty);
      return;
    }
    els.historyList.innerHTML = '';
    state.history.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.style.animationDelay = `${idx * 0.05}s`;
      div.innerHTML = `
        <span class="h-round">#${item.round}</span>
        <span class="h-emojis">
          ${EMOJI[item.user]}
          <span class="h-vs">vs</span>
          ${EMOJI[item.cpu]}
        </span>
        <span class="h-result ${item.result}">${item.result === 'win' ? 'Win' : item.result === 'lose' ? 'Lose' : 'Draw'}</span>
      `;
      els.historyList.appendChild(div);
    });
  }

  /* ══════════════════════════════════════════════
     CONFETTI (on win)
  ══════════════════════════════════════════════ */
  const CONFETTI_COLORS = ['#818cf8','#f472b6','#38bdf8','#4ade80','#fbbf24','#fb923c','#a78bfa'];

  function spawnConfetti(count = 36) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-particle';
      const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const x     = Math.random() * 100;
      const dur   = 1.2 + Math.random() * 1.2;
      const delay = Math.random() * 0.6;
      el.style.cssText = `
        left:${x}vw;
        background:${color};
        animation-duration:${dur}s;
        animation-delay:${delay}s;
        width:${6 + Math.random()*6}px;
        height:${6 + Math.random()*6}px;
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), (dur + delay) * 1000 + 200);
    }
  }

  /* ══════════════════════════════════════════════
     MAIN PLAY FLOW
  ══════════════════════════════════════════════ */
  async function play(userChoice) {
    if (state.locked) return;

    // 1. Lock UI & reset visual state
    lockButtons(true);
    clearSelections();
    hideResultBanner();
    els.userWrap.classList.remove('winner-glow','loser-dim','shake','visible');
    els.cpuWrap.classList.remove('winner-glow','loser-dim','shake','visible');

    // 2. Show user choice immediately
    highlightButton(userChoice);
    setBattleEmoji(els.userWrap, EMOJI[userChoice], true);
    setBattleEmoji(els.cpuWrap, '❓', false);
    setRoundText(`Round ${state.round} · CPU is thinking…`);

    // 3. Pretend CPU is "thinking" for suspense
    showThinking(true);
    await delay(700);
    showThinking(false);

    // 4. Determine result
    const cpuChoice = getCpuChoice();
    const result    = getResult(userChoice, cpuChoice);

    // 5. Reveal CPU choice with animation
    setBattleEmoji(els.cpuWrap, EMOJI[cpuChoice], true);
    await delay(350);

    // 6. Apply glow / dim to battle emojis
    applyBattleGlow(result);
    await delay(200);

    // 7. Show result banner
    showResultBanner(result, userChoice, cpuChoice);

    // 8. Update scores
    if (result === 'win') {
      state.userScore++;
      animateScore(els.scoreUser, state.userScore);
      spawnConfetti(32);
    } else if (result === 'lose') {
      state.cpuScore++;
      animateScore(els.scoreCpu, state.cpuScore);
    }

    // 9. Update history
    addHistoryEntry({ round: state.round, user: userChoice, cpu: cpuChoice, result });
    state.round++;
    setRoundText(`Round ${state.round} · Make your choice`);

    // 10. Unlock buttons after brief pause
    await delay(450);
    lockButtons(false);
  }

  /* ══════════════════════════════════════════════
     RESET
  ══════════════════════════════════════════════ */
  function resetGame() {
    state.userScore = 0;
    state.cpuScore  = 0;
    state.round     = 1;
    state.history   = [];
    state.locked    = false;

    els.scoreUser.textContent = '0';
    els.scoreCpu.textContent  = '0';
    setRoundText('Round 1 · Make your choice');

    clearSelections();
    lockButtons(false);
    hideResultBanner();

    setBattleEmoji(els.userWrap, '❓', false);
    setBattleEmoji(els.cpuWrap,  '❓', false);
    els.userWrap.classList.remove('winner-glow','loser-dim','shake','visible');
    els.cpuWrap.classList.remove('winner-glow','loser-dim','shake','visible');

    showThinking(false);
    renderHistory();
  }

  /* ══════════════════════════════════════════════
     UTILITY
  ══════════════════════════════════════════════ */
  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  /* ══════════════════════════════════════════════
     EVENT LISTENERS
  ══════════════════════════════════════════════ */
  els.choiceBtns.forEach(btn => {
    btn.addEventListener('click', () => play(btn.dataset.choice));
  });

  els.resetBtn.addEventListener('click', resetGame);

  // Keyboard shortcuts: R, P, S keys
  document.addEventListener('keydown', (e) => {
    if (state.locked) return;
    const map = { r: 'rock', p: 'paper', s: 'scissors' };
    const choice = map[e.key.toLowerCase()];
    if (choice) play(choice);
  });

  /* ══════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════ */
  renderHistory();
</script>
</body>
</html>
